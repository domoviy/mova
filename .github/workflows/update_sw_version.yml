name: Update SW Cache Version

# Запускається при кожному пуші у main (крім пушів від самого бота)
on:
  push:
    branches: [main]
    paths-ignore:
      - 'audio/**'   # аудіо-файли не потребують оновлення кешу SW

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  bump-sw-version:
    runs-on: ubuntu-latest
    # Не запускаємось якщо це пуш від github-actions[bot] (щоб не зациклитись)
    if: github.actor != 'github-actions[bot]'

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump versions
        run: |
          # Версія = номер запуску + короткий SHA: напр. 142-a1b2c3d
          NEW_VERSION="${{ github.run_number }}-$(echo ${{ github.sha }} | cut -c1-7)"
          echo "Нова версія: $NEW_VERSION"

          # sw.js — CACHE_VERSION
          sed -i "s|const CACHE_VERSION = '.*';|const CACHE_VERSION = '${NEW_VERSION}';|" sw.js

          # index.html — APP_VERSION
          sed -i "s|const APP_VERSION = '.*';|const APP_VERSION = '${NEW_VERSION}';|" index.html

          echo "sw.js:"; grep "CACHE_VERSION" sw.js
          echo "index.html:"; grep "APP_VERSION" index.html

      - name: Configure Git Bot
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Commit updated versions
        run: |
          git add sw.js index.html
          if git diff --staged --quiet; then
            echo "Версії не змінились — пропускаємо коміт"
          else
            git commit -m "⚙️ Version bump to ${NEW_VERSION} [skip ci]"
            git push
          fi
