name: Generate TTS Audio

# Запускається автоматично при зміні B2-Beruf.js або вручну
on:
  push:
    paths:
      - 'B2-Beruf.js'
  workflow_dispatch:   # Ручне керування з вибором двигуна та режимів
    inputs:
      tts_engine:
        description: 'Оберіть двигун генерації (за замовчуванням Edge TTS)'
        required: true
        default: 'edge'
        type: choice
        options:
          - 'edge'
          - 'azure'
      run_turbo:
        description: 'Увімкнути режим TURBO (для тарифу Azure S0 або швидкого Edge)'
        required: false
        default: false
        type: boolean
      run_free:
        description: 'Увімкнути режим FREE (повільний потік)'
        required: false
        default: false
        type: boolean

# Глобальні налаштування для всього Workflow
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'   # Виправляє депрекацію Node.js 20 і вмикає Node 24

jobs:
  generate:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # Потрібно для коміту аудіофайлів назад у репозиторій

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ВСТАНОВЛЕННЯ ЗАЛЕЖНОСТЕЙ: Додано бібліотеку edge-tts
      - name: Install Dependencies
        run: |
          pip install edge-tts azure-cognitiveservices-speech

      # НАЛАШТУВАННЯ GIT: Потрібно заздалегідь для авто-сейвів скрипту
      - name: Configure Git Bot
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Виставляємо параметри швидкості та ліміти збереження залежно від типу запуску
      - name: Generate audio files
        env:
          AZURE_SPEECH_KEY:    ${{ secrets.AZURE_SPEECH_KEY }}
          AZURE_SPEECH_REGION: ${{ secrets.AZURE_SPEECH_REGION }}
          # Якщо це автоматичний push, github.event.inputs.tts_engine порожній, тому піде 'edge'
          TTS_ENGINE:          ${{ github.event.inputs.tts_engine || 'edge' }}
          # Якщо активовано 'run_turbo' — ставимо 15 потоків, інакше — 1 потік
          TTS_WORKERS: ${{ github.event.inputs.run_turbo == 'true' && '15' || '1' }}
          # Якщо активовано 'run_turbo' — ставимо паузу 0.05, інакше — 1.2 сек
          TTS_DELAY:   ${{ github.event.inputs.run_turbo == 'true' && '0.05' || '1.2' }}
          # Кількість файлів у пачці для проміжного коміту (15 для турбо, 3 для звичайного)
          TTS_COMMIT_LIMIT: ${{ github.event.inputs.run_turbo == 'true' && '15' || '3' }}
        run: python gen_audio.py

      # ФІНАЛЬНИЙ КОМІТ: Дозаписує залишки файлів, які не ввійшли в останню пачку
      - name: Final Commit and push
        run: |
          git add audio/
          if git diff --staged --quiet; then
            echo "All files were already synced by Python script."
          else
            CARD_COUNT=$(git diff --staged --name-only | grep '\.mp3$' | wc -l | tr -d ' ')
            git commit -m "🎙 Generate TTS audio (Final Batch): ${CARD_COUNT} files [skip ci]"
            git push
          fi