name: Generate TTS Audio

# Запускається автоматично ПІСЛЯ успішного завершення "Update SW Cache Version"
# (щоб генерація аудіо не конкурувала за ресурси з перевіркою/деплоєм
# файлів баз B2-Beruf.js та Financial-Accounting-Foundations.js),
# або вручну.
on:
  workflow_run:
    workflows: ['Update SW Cache Version']
    types:
      - completed
  workflow_dispatch:   # Ручне керування режимами швидкості
    inputs:
      run_turbo:
        description: 'Увімкнути режим TURBO (швидкий потік)'
        required: false
        default: false
        type: boolean
      run_free:
        description: 'Увімкнути режим FREE (повільний потік, менша пачка коміту)'
        required: false
        default: false
        type: boolean

# Не даємо двом запускам (напр. ручному й автоматичному) одночасно
# писати в audio/ — це саме та ситуація, що призводила до застарілого
# manifest.json, конфліктів при pull --rebase і, як наслідок, повторної
# генерації вже готових файлів.
concurrency:
  group: gen-audio
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    # Запускаємо, якщо це ручний запуск АБО деплой (бамп версії) завершився
    # успішно (при провалі — генерацію аудіо пропускаємо).
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    permissions:
      contents: write   # Потрібно для коміту аудіофайлів назад у репозиторій

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Для workflow_run беремо саме той коміт, що був задеплоєний —
          # нижче ми звіримо з нього ЛИШЕ файли баз, а не весь working tree
          # (див. крок "Sync branch tip" — інакше manifest.json/audio/
          # лишаються застарілими, і скрипт вважає вже готові файли новими).
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
        # Дефолтний неглибокий checkout (fetch-depth: 1) — повна історія
        # git тут не використовується, тож тягнути її не потрібно.

      # ⚠️ КРИТИЧНО: просте "git checkout -B BRANCH" (без другого аргументу)
      # створює локальну гілку НА ПОТОЧНОМУ (старому, задеплоєному) коміті,
      # а не на актуальному tip-і origin/BRANCH. Через це working tree
      # лишався застарілим — manifest.json та вже згенеровані mp3 з
      # попередніх запусків (закомічені вже ПІСЛЯ SHA, який тут
      # задеплоївся) були невидимі скрипту, і він генерував ті самі файли
      # знову. Тут явно синхронізуємось з origin/BRANCH (актуальний
      # audio/ + manifest.json), а файли баз даних беремо саме версії,
      # що реально задеплоєна.
      - name: Sync branch tip (keep audio/manifest.json fresh)
        run: |
          BRANCH="${{ github.event.workflow_run.head_branch || github.ref_name }}"
          DEPLOYED_SHA="${{ github.event.workflow_run.head_sha || github.sha }}"
          echo "Гілка: $BRANCH, задеплоєний коміт: $DEPLOYED_SHA"

          git fetch origin "$BRANCH"
          git checkout -B "$BRANCH" "origin/$BRANCH"
          git branch --set-upstream-to="origin/$BRANCH" "$BRANCH"

          # Файли баз даних беремо ТОЧНО ті, що були задеплоєні (а не
          # можливо новіші з тих пір, що з'явились на origin/BRANCH) —
          # audio генерується саме під той контент, який зараз бачать
          # користувачі.
          git checkout "$DEPLOYED_SHA" -- '*.js'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install edge-tts

      # НАЛАШТУВАННЯ GIT: Потрібно заздалегідь для авто-сейвів скрипту
      - name: Configure Git Bot
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Виставляємо параметри швидкості та ліміти збереження залежно від типу запуску
      - name: Generate audio files
        env:
          # Якщо активовано 'run_turbo' — ставимо 15 потоків, інакше — 1 потік
          TTS_WORKERS: ${{ github.event.inputs.run_turbo == 'true' && '15' || '1' }}
          # Якщо активовано 'run_turbo' — ставимо паузу 0.05, інакше — 1.2 сек
          TTS_DELAY:   ${{ github.event.inputs.run_turbo == 'true' && '0.05' || '1.2' }}
          # Кількість файлів у пачці для проміжного коміту:
          # 15 — TURBO, 25 — FREE (повільний потік, частіші проміжні коміти),
          # 50 — звичайний автозапуск (workflow_run) чи ручний без прапорців.
          TTS_COMMIT_LIMIT: >-
            ${{ github.event.inputs.run_turbo == 'true' && '15'
             || github.event.inputs.run_free == 'true' && '25'
             || '50' }}
        run: python gen_audio.py

      # ФІНАЛЬНИЙ КОМІТ: Дозаписує залишки файлів, які не ввійшли в останню пачку
      - name: Final Commit and push
        run: |
          git add audio/
          if git diff --staged --quiet; then
            echo "All files were already synced by Python script."
          else
            CARD_COUNT=$(git diff --staged --name-only | grep '\.mp3$' | wc -l | tr -d ' ')
            git commit -m "🎙 Generate TTS audio (Final Batch): ${CARD_COUNT} files [skip ci]"
            git push
          fi
