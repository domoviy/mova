name: Generate TTS Audio

# Запускається при зміні vocab-data.js або вручну
on:
  push:
    paths:
      - 'vocab-data.js'
  workflow_dispatch:   # ← Дві незалежні кнопки-перемикачі для ручного запуску
    inputs:
      run_turbo:
        description: 'Увімкнути режим TURBO (для тарифу S0 Standard)'
        required: false
        default: false
        type: boolean
      run_free:
        description: 'Увімкнути режим FREE (повільний потік для F0)'
        required: false
        default: false
        type: boolean

jobs:
  generate:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # потрібно щоб комітити аудіо файли

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # НАЛАШТУВАННЯ GIT: Потрібно заздалегідь, щоб Python міг робити авто-сейви
      - name: Configure Git Bot
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Виставляємо параметри швидкості та ліміти збереження залежно від типу запуску
      - name: Generate audio files
        env:
          AZURE_SPEECH_KEY:    ${{ secrets.AZURE_SPEECH_KEY }}
          AZURE_SPEECH_REGION: ${{ secrets.AZURE_SPEECH_REGION }}
          # Якщо активовано 'run_turbo' — ставимо 15 потоків, інакше — 1 потік
          TTS_WORKERS: ${{ github.event.inputs.run_turbo == 'true' && '15' || '1' }}
          # Якщо активовано 'run_turbo' — ставимо паузу 0.05, інакше — 1.2 сек
          TTS_DELAY:   ${{ github.event.inputs.run_turbo == 'true' && '0.05' || '1.2' }}
          # ДИНАМІЧНИЙ ЛІМІТ КАРТОК: 15 для турбо, 3 для безкоштовного режиму
          TTS_COMMIT_LIMIT: ${{ github.event.inputs.run_turbo == 'true' && '15' || '3' }}
        run: python gen_audio.py

      # ФІНАЛЬНИЙ КОМІТ: Дозаписує залишки файлів, які не ввійшли в останню пачку
      - name: Final Commit and push
        run: |
          git add audio/
          if git diff --staged --quiet; then
            echo "All files were already synced by Python script."
          else
            CARD_COUNT=$(git diff --staged --name-only | grep '\.mp3$' | wc -l | tr -d ' ')
            git commit -m "🎙 Generate TTS audio (Final Batch): ${CARD_COUNT} files [skip ci]"
            git push
          fi