name: Generate TTS Audio

# Запускається автоматично ПІСЛЯ успішного завершення workflow деплою
# (щоб генерація аудіо не конкурувала за ресурси з перевіркою/деплоєм
# файлів баз B2-Beruf.js та Financial-Accounting-Foundations.js),
# або вручну.
on:
  workflow_run:
    # ⚠️ ЗАМІНІТЬ на точну назву (поле `name:` на початку yml-файлу
    # вашого workflow деплою) — назва файлу тут не підходить.
    workflows: ['YOUR_DEPLOY_WORKFLOW_NAME']
    types:
      - completed
  workflow_dispatch:   # Ручне керування режимами швидкості
    inputs:
      run_turbo:
        description: 'Увімкнути режим TURBO (швидкий потік)'
        required: false
        default: false
        type: boolean
      run_free:
        description: 'Увімкнути режим FREE (повільний потік)'
        required: false
        default: false
        type: boolean

jobs:
  generate:
    runs-on: ubuntu-latest
    # Запускаємо, якщо це ручний запуск АБО деплой завершився успішно
    # (при провалі деплою генерацію аудіо пропускаємо).
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    permissions:
      contents: write   # Потрібно для коміту аудіофайлів назад у репозиторій

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Для workflow_run обов'язково беремо саме той коміт, що був
          # задеплоєний, а не дефолтну гілку (інакше можна підхопити
          # застарілу версію баз).
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
        # Дефолтний неглибокий checkout (fetch-depth: 1) — повна історія
        # git тут не використовується, тож тягнути її не потрібно.

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install edge-tts

      # НАЛАШТУВАННЯ GIT: Потрібно заздалегідь для авто-сейвів скрипту
      - name: Configure Git Bot
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # Виставляємо параметри швидкості та ліміти збереження залежно від типу запуску
      - name: Generate audio files
        env:
          # Якщо активовано 'run_turbo' — ставимо 15 потоків, інакше — 1 потік
          TTS_WORKERS: ${{ github.event.inputs.run_turbo == 'true' && '15' || '1' }}
          # Якщо активовано 'run_turbo' — ставимо паузу 0.05, інакше — 1.2 сек
          TTS_DELAY:   ${{ github.event.inputs.run_turbo == 'true' && '0.05' || '1.2' }}
          # Кількість файлів у пачці для проміжного коміту (15 для турбо, 50 для звичайного)
          TTS_COMMIT_LIMIT: ${{ github.event.inputs.run_turbo == 'true' && '15' || '50' }}
        run: python gen_audio.py

      # ФІНАЛЬНИЙ КОМІТ: Дозаписує залишки файлів, які не ввійшли в останню пачку
      - name: Final Commit and push
        run: |
          git add audio/
          if git diff --staged --quiet; then
            echo "All files were already synced by Python script."
          else
            CARD_COUNT=$(git diff --staged --name-only | grep '\.mp3$' | wc -l | tr -d ' ')
            git commit -m "🎙 Generate TTS audio (Final Batch): ${CARD_COUNT} files [skip ci]"
            git push
          fi
